name: CI OnEstLà

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Symfony + PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: onestla_test
          MYSQL_USER: onestla
          MYSQL_PASSWORD: onestla_pwd
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, zip, mbstring

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress

      - name: Generate JWT keys
        working-directory: backend
        run: |
          mkdir -p config/jwt
          php bin/console lexik:jwt:generate-keypair --skip-if-exists
        env:
          JWT_PASSPHRASE: test_passphrase

      - name: Run migrations
        working-directory: backend
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test
        env:
          DATABASE_URL: "mysql://onestla:onestla_pwd@127.0.0.1:3306/onestla_test?serverVersion=8.0"

      - name: Run tests
        working-directory: backend
        run: php bin/phpunit --testdox
        env:
          DATABASE_URL: "mysql://onestla:onestla_pwd@127.0.0.1:3306/onestla_test?serverVersion=8.0"

  frontend:
    name: Frontend (React + Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
